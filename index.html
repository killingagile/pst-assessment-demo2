<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pioneer · Settler · Town Planner — Self-Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ee-blue: #1795D4;
    --tech-blue: #22567C;
    --teal: #269C9E;
    --ember: #F07C00;
    --dark: #212526;
    --cloud: #F5F5F5;
    --white: #FFFFFF;
    --font: 'Lexend', sans-serif;
  }
  html { font-size: 16px; }
  body {
    font-family: var(--font);
    background: var(--cloud);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #root { display: flex; flex-direction: column; min-height: 100vh; }

  /* Header */
  .ee-header {
    background: var(--tech-blue);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ee-header-logo { height: 36px; display: block; }
  .ee-header-wordmark {
    font-family: var(--font);
    color: white;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: 1.1;
  }
  .ee-header-wordmark span { display: block; font-size: 11px; opacity: 0.7; margin-top: 1px; letter-spacing: 0.06em; text-transform: uppercase; }
  .ee-accent-bar {
    height: 4px;
    background: linear-gradient(90deg, #1795D4 0%, #269C9E 45%, #F07C00 100%);
  }

  /* Footer */
  .ee-footer {
    background: var(--dark);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: auto;
  }
  .ee-footer-logo { height: 28px; opacity: 0.85; }
  .ee-footer-text { color: rgba(255,255,255,0.45); font-size: 12px; margin-left: auto; }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }
  .card {
    background: var(--white);
    border-radius: 8px;
    padding: 40px 48px;
    max-width: 680px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  /* Section label */
  .label {
    font-size: 12px;
    font-weight: 400;
    color: var(--ee-blue);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  h1, h2 {
    font-size: 22px;
    font-weight: 400;
    color: var(--tech-blue);
    line-height: 1.2;
    margin-bottom: 20px;
  }
  h3 { font-size: 17px; font-weight: 500; color: var(--tech-blue); margin-bottom: 12px; }
  p { font-size: 14px; line-height: 1.6; color: var(--dark); margin-bottom: 14px; }
  p:last-child { margin-bottom: 0; }

  /* Button */
  .btn {
    display: inline-block;
    background: var(--ee-blue);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 12px 28px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
  }
  .btn:hover { background: #1280bb; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--ee-blue);
    color: var(--ee-blue);
  }
  .btn-outline:hover { background: rgba(23,149,212,0.07); }

  /* Form fields */
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: var(--tech-blue); margin-bottom: 6px; }
  .field input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #d0d7de;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 14px;
    color: var(--dark);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--ee-blue); }
  .field .hint { font-size: 12px; color: #666; margin-top: 4px; }
  .field .error { font-size: 12px; color: #c0392b; margin-top: 4px; }

  /* Progress bar */
  .progress-wrap { margin-bottom: 28px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 6px; }
  .progress-track { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--ee-blue); border-radius: 3px; transition: width 0.3s ease; }

  /* Question */
  .question-scenario {
    font-size: 16px;
    font-weight: 500;
    color: var(--tech-blue);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .question-prompt { font-size: 13px; color: #555; margin-bottom: 22px; }

  /* Answer options */
  .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    border: 2px solid #e0e0e0;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--white);
  }
  .option:hover { border-color: var(--ee-blue); background: rgba(23,149,212,0.04); }
  .option.selected { border-color: var(--ee-blue); background: rgba(23,149,212,0.08); }
  .option input[type="radio"] { display: none; }
  .option-indicator {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #ccc;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s;
  }
  .option.selected .option-indicator { border-color: var(--ee-blue); background: var(--ee-blue); }
  .option.selected .option-indicator::after {
    content: '';
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
  }
  .option-text { font-size: 14px; line-height: 1.5; color: var(--dark); flex: 1; }

  /* Question nav */
  .q-nav { display: flex; align-items: center; justify-content: space-between; }
  .q-nav .q-counter { font-size: 13px; color: #888; }

  /* Unanswered warning */
  .warn { font-size: 13px; color: #c0392b; margin-bottom: 10px; }

  /* Results */
  .result-intro { font-size: 14px; color: #555; margin-bottom: 28px; line-height: 1.6; }
  .scores { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
  .score-row { display: flex; flex-direction: column; gap: 4px; }
  .score-header { display: flex; justify-content: space-between; align-items: center; }
  .score-label { font-size: 14px; font-weight: 600; }
  .score-label.pioneer { color: #1795D4; }
  .score-label.settler { color: #269C9E; }
  .score-label.townplanner { color: #F07C00; }
  .score-count { font-size: 13px; color: #666; }
  .score-track { height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 6px; transition: width 0.6s ease; }
  .score-bar.pioneer { background: #1795D4; }
  .score-bar.settler { background: #269C9E; }
  .score-bar.townplanner { background: #F07C00; }

  .profile-box {
    background: var(--cloud);
    border-left: 4px solid var(--ee-blue);
    border-radius: 4px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .profile-box h3 { color: var(--tech-blue); margin-bottom: 8px; }
  .profile-box p { font-size: 14px; line-height: 1.6; }

  .disclaimer {
    background: #fff8f0;
    border: 1px solid #f5d5a0;
    border-radius: 4px;
    padding: 14px 18px;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }

  /* Unanswered highlight */
  .option.unanswered-warn { border-color: #c0392b; }

  /* Intro list */
  .intro-list { padding-left: 20px; margin: 12px 0 18px; }
  .intro-list li { font-size: 14px; line-height: 1.7; color: var(--dark); }

  /* Divider */
  .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }

  @media (max-width: 560px) {
    .card { padding: 28px 22px; }
    .ee-header { padding: 14px 20px; }
    .ee-footer { padding: 20px 20px; }
    .btn-row { flex-direction: column; }
    .btn { text-align: center; }
  }
</style>
</head>

// ─── Score → interpretation ───────────────────────────────────────────────────
function interpret(scores) {
  const { Pioneer, Settler, TownPlanner } = scores;
  const total = [Pioneer, Settler, TownPlanner];
  const max = Math.max(...total);
  const sorted = [...total].sort((a, b) => b - a);
  const gap = sorted[0] - sorted[1];

  const modes = ["Pioneer", "Settler", "TownPlanner"];
  const labels = { Pioneer: "Pioneer", Settler: "Settler", TownPlanner: "Town Planner" };
  const topModes = modes.filter(m => scores[m] === max);

  if (gap >= 2 && topModes.length === 1) {
    const mode = topModes[0];
    const descriptions = {
      Pioneer: {
        heading: "Strong Pioneer tendency",
        body: "Your responses suggest you are most naturally drawn to discovery and experimentation. You tend to thrive in ambiguous, early-stage situations — exploring possibilities, generating new ideas, and moving fast to learn what works. You are most energised when the path ahead is uncertain and open.",
      },
      Settler: {
        heading: "Strong Settler tendency",
        body: "Your responses suggest you are most naturally drawn to shaping ideas into practical outcomes. You tend to take rough or uncertain work and make it usable, reliable, and fit for purpose. You are most energised when you can see something evolve from rough promise into something that genuinely works.",
      },
      TownPlanner: {
        heading: "Strong Town Planner tendency",
        body: "Your responses suggest you are most naturally drawn to structure, consistency, and dependable operation. You tend to focus on making systems predictable, efficient, and scalable. You are most energised when you can bring order, clarity, and reliability to work that others depend on.",
      },
    };
    return descriptions[mode];
  }

  // Blended: identify top two
  if (gap <= 1 && sorted[0] !== sorted[2]) {
    const topTwo = modes.filter(m => scores[m] >= sorted[1]).slice(0, 2);
    const key = topTwo.sort().join("-");
    const blends = {
      "Pioneer-Settler": {
        heading: "Pioneer–Settler blend",
        body: "Your responses suggest a natural comfort in both the exploratory and shaping phases of work. You may be drawn to generating new possibilities and also enjoy helping those ideas take practical form. This blend can be especially effective in early product development, where discovery and delivery need to work closely together.",
      },
      "Pioneer-TownPlanner": {
        heading: "Pioneer–Town Planner blend",
        body: "Your responses suggest a tendency to move between open exploration and the desire to bring clarity and control. You may enjoy both the early freedom of discovery and the satisfaction of seeing things run reliably at scale. This blend is less common — and can reflect someone who thinks carefully about both ends of the evolution curve.",
      },
      "Settler-TownPlanner": {
        heading: "Settler–Town Planner blend",
        body: "Your responses suggest you are most naturally drawn to making things work well and keeping them running reliably. You may be at your best when taking something that has been discovered and shaping it into a dependable, scalable solution. You tend to be less drawn to open-ended exploration and more focused on quality and consistency.",
      },
    };
    return blends[key] || {
      heading: "Blended profile",
      body: "Your responses suggest roughly equal comfort across two of the three modes. You may find value in reflecting on which situations bring out each tendency.",
    };
  }

  // Balanced
  return {
    heading: "Balanced profile",
    body: "Your responses are spread relatively evenly across all three modes. This can reflect genuine flexibility — an ability to operate across discovery, shaping, and systematisation depending on what the situation needs. It may also be worth reflecting on whether one mode feels more natural or energising than the others in practice.",
  };
}

// ─── Data submission ──────────────────────────────────────────────────────────
function submit(name, email, answers, scores, profile) {
  if (!GAS_URL || GAS_URL === "YOUR_GAS_ENDPOINT_HERE") return;
  try {
    const params = new URLSearchParams({
      name,
      email,
      pioneer: scores.Pioneer,
      settler: scores.Settler,
      townplanner: scores.TownPlanner,
      profile: profile.heading,
      answers: JSON.stringify(answers),
    });
    new Image().src = `${GAS_URL}?${params.toString()}`;
  } catch (_) {}
}

function RegistrationScreen({ onSubmit }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [errors, setErrors] = useState({});

  function validate() {
    const e = {};
    if (!name.trim()) e.name = "Please enter your name.";
    if (!email.trim()) e.email = "Please enter your email address.";
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) e.email = "Please enter a valid email address.";
    return e;
  }

  function handleSubmit() {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    onSubmit(name.trim(), email.trim());
  }

  return (
    <div className="main">
      <div className="card">
        <div className="label">Step 1 of 2</div>
        <h2>A few details before you start</h2>
        <p>Your details help us associate the result with you. Your EE email address is preferred where applicable.</p>

        <div className="field">
          <label htmlFor="name">Full name</label>
          <input
            id="name"
            type="text"
            placeholder="Your name"
            value={name}
            onChange={e => { setName(e.target.value); setErrors(er => ({...er, name: ""})); }}
            onKeyDown={e => e.key === "Enter" && handleSubmit()}
          />
          {errors.name && <div className="error">{errors.name}</div>}
        </div>

        <div className="field">
          <label htmlFor="email">Email address</label>
          <input
            id="email"
            type="email"
            placeholder="you@equalexperts.com"
            value={email}
            onChange={e => { setEmail(e.target.value); setErrors(er => ({...er, email: ""})); }}
            onKeyDown={e => e.key === "Enter" && handleSubmit()}
          />
          <div className="hint">Please use your EE email address where possible.</div>
          {errors.email && <div className="error">{errors.email}</div>}
        </div>

        <button className="btn" onClick={handleSubmit}>Continue to assessment</button>
      </div>
    </div>
  );
}

// ─── Screen: Questions ────────────────────────────────────────────────────────
function QuestionScreen({ name, email, onComplete }) {
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState({});
  const [showWarn, setShowWarn] = useState(false);

  const q = SHUFFLED_QUESTIONS[current];
  const totalQ = SHUFFLED_QUESTIONS.length;
  const answered = answers[q.id] !== undefined;

  function select(optIndex) {
    setAnswers(a => ({ ...a, [q.id]: optIndex }));
    setShowWarn(false);
  }

  function next() {
    if (!answered) { setShowWarn(true); return; }
    if (current < totalQ - 1) {
      setCurrent(c => c + 1);
      setShowWarn(false);
    } else {
      // Calculate scores
      const scores = { Pioneer: 0, Settler: 0, TownPlanner: 0 };
      SHUFFLED_QUESTIONS.forEach(qq => {
        const choice = answers[qq.id];
        if (choice !== undefined) scores[qq.options[choice].mode]++;
      });
      onComplete(answers, scores);
    }
  }

  function back() {
    if (current > 0) { setCurrent(c => c - 1); setShowWarn(false); }
  }

  const pct = Math.round((current / totalQ) * 100);

  return (
    <div className="main">
      <div className="card">
        <div className="progress-wrap">
          <div className="progress-meta">
            <span>Question {current + 1} of {totalQ}</span>
            <span>{totalQ - current - 1} remaining</span>
          </div>
          <div className="progress-track">
            <div className="progress-fill" style={{ width: `${pct + (100/totalQ * (answered ? 1 : 0))}%` }} />
          </div>
        </div>

        <div className="question-scenario">{q.scenario}</div>
        <div className="question-prompt">{q.prompt}</div>

        <div className="options">
          {q.options.map((opt, i) => (
            <label
              key={i}
              className={`option${answers[q.id] === i ? " selected" : ""}${showWarn && answers[q.id] === undefined ? " unanswered-warn" : ""}`}
              onClick={() => select(i)}
              role="radio"
              aria-checked={answers[q.id] === i}
              tabIndex={0}
              onKeyDown={e => (e.key === " " || e.key === "Enter") && select(i)}
            >
              <div className="option-indicator" />
              <span className="option-text">{opt.text}</span>
            </label>
          ))}
        </div>

        {showWarn && <div className="warn">Please select an answer before continuing.</div>}

        <div className="q-nav">
          <button
            className="btn btn-outline"
            onClick={back}
            disabled={current === 0}
            style={{ visibility: current === 0 ? "hidden" : "visible" }}
          >
            Back
          </button>
          <button className="btn" onClick={next}>
            {current < totalQ - 1 ? "Next" : "See my result"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Screen: Results ──────────────────────────────────────────────────────────
function ResultScreen({ name, email, answers, scores, onRetake }) {
  const profile = interpret(scores);
  const maxScore = 4;

  // Submit silently on mount
  React.useEffect(() => {
    submit(name, email, answers, scores, profile);
  }, []);

  const modeConfig = [
    { key: "Pioneer",     label: "Pioneer",      cls: "pioneer" },
    { key: "Settler",     label: "Settler",       cls: "settler" },
    { key: "TownPlanner", label: "Town Planner",  cls: "townplanner" },
  ];

  return (
    <div className="main">
      <div className="card">
        <div className="label">Your profile</div>
        <h2>Here is what your responses suggest</h2>
        <p className="result-intro">
          The profile below reflects the pattern of your answers across 8 behaviour-based
          trade-offs. It shows your relative tendency across the three modes — not a fixed
          identity or a definitive result.
        </p>

        <div className="scores">
          {modeConfig.map(({ key, label, cls }) => (
            <div className="score-row" key={key}>
              <div className="score-header">
                <span className={`score-label ${cls}`}>{label}</span>
                <span className="score-count">{scores[key]} / {maxScore}</span>
              </div>
              <div className="score-track">
                <div
                  className={`score-bar ${cls}`}
                  style={{ width: `${(scores[key] / maxScore) * 100}%` }}
                />
              </div>
            </div>
          ))}
        </div>

        <div className="profile-box">
          <h3>{profile.heading}</h3>
          <p>{profile.body}</p>
        </div>

        <div className="disclaimer">
          This is a lightweight reflection tool, not a validated psychometric assessment.
          The result is intended to prompt useful discussion and self-reflection — not to
          permanently define how you work or what roles suit you.
        </div>

        <div className="btn-row">
          <button className="btn btn-outline" onClick={onRetake}>Retake assessment</button>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("landing");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [answers, setAnswers] = useState({});
  const [scores, setScores] = useState({});

  function handleStart() { setScreen("register"); }
  function handleRegister(n, e) { setName(n); setEmail(e); setScreen("questions"); }
  function handleComplete(ans, sc) { setAnswers(ans); setScores(sc); setScreen("results"); }
  function handleRetake() { setScreen("landing"); setName(""); setEmail(""); setAnswers({}); setScores({}); }

  return (
    <>
      <Header />
      {screen === "landing"    && <LandingScreen onStart={handleStart} />}
      {screen === "register"   && <RegistrationScreen onSubmit={handleRegister} />}
      {screen === "questions"  && <QuestionScreen name={name} email={email} onComplete={handleComplete} />}
      {screen === "results"    && <ResultScreen name={name} email={email} answers={answers} scores={scores} onRetake={handleRetake} />}
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
